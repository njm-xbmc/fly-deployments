name: Auto-Update Fly.io Apps

on:
  schedule:
    - cron: '0 3 * * *'  # Runs every day at 3am UTC
  workflow_dispatch:      # Also allows manual trigger from GitHub Actions tab

jobs:

  update-comet:
    name: Update Comet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: g0ldyy/comet
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy
        run: flyctl deploy --app comet-late-inlet-5587 --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      - name: Notify success
        if: success()
        run: curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" -d text="✅ Comet updated successfully on Fly.io"
      - name: Notify failure
        if: failure()
        run: curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" -d text="❌ Comet update FAILED on Fly.io"

  update-aiostreams:
    name: Update AIOStreams
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: Viren070/AIOStreams
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy
        run: flyctl deploy --app user-airy-grove-3803 --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      - name: Notify success
        if: success()
        run: curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" -d text="✅ AIOStreams updated successfully on Fly.io"
      - name: Notify failure
        if: failure()
        run: curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" -d text="❌ AIOStreams update FAILED on Fly.io"

  update-deepbridge:
    name: Update Deepbridge
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: Cxsmo-ai/Deepbridge
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy
        run: flyctl deploy --app deepbridge --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      - name: Notify success
        if: success()
        run: curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" -d text="✅ Deepbridge updated successfully on Fly.io"
      - name: Notify failure
        if: failure()
        run: curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" -d text="❌ Deepbridge update FAILED on Fly.io"

  update-streamnzb:
    name: Update StreamNZB
    runs-on: ubuntu-latest
    steps:
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy
        run: flyctl deploy --app user-small-hollow-3661 --image ghcr.io/gaisberg/streamnzb:latest
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      - name: Notify success
        if: success()
        run: curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" -d text="✅ StreamNZB updated successfully on Fly.io"
      - name: Notify failure
        if: failure()
        run: curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" -d text="❌ StreamNZB update FAILED on Fly.io"

  update-nuvio-streams:
    name: Update Nuvio Streams Addon
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: tapframe/NuvioStreamsAddon
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Override Dockerfile for Node 20
        run: |
          cat > Dockerfile << 'DEOF'
          FROM node:20-alpine
          WORKDIR /app
          COPY package*.json ./
          RUN npm install --production
          COPY . .
          EXPOSE 8080
          ENV PORT=8080
          CMD ["node", "server.js"]
          DEOF
      - name: Deploy
        run: flyctl deploy --app nuviostreamsaddon-young-tree-5810 --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      - name: Notify success
        if: success()
        run: curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" -d text="✅ Nuvio Streams updated successfully on Fly.io"
      - name: Notify failure
        if: failure()
        run: curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" -d text="❌ Nuvio Streams update FAILED on Fly.io"

  update-sootio:
    name: Update Sootio
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: njm-xbmc/sootio-stremio-addon
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy
        run: flyctl deploy --app sootio --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      - name: Notify success
        if: success()
        run: curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" -d text="✅ Sootio updated successfully on Fly.io"
      - name: Notify failure
        if: failure()
        run: curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" -d text="❌ Sootio update FAILED on Fly.io"

  update-aiolists:
    name: Update AIOLists
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: SebastianMorel/AIOLists
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy
        run: flyctl deploy --app aiolists --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      - name: Notify success
        if: success()
        run: curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" -d text="✅ AIOLists updated successfully on Fly.io"
      - name: Notify failure
        if: failure()
        run: curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" -d text="❌ AIOLists update FAILED on Fly.io"

  update-torrin-addon:
    name: Update Torrin Addon
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: torrin-app/torrin-addon
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy
        run: flyctl deploy --app torrin-addon --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      - name: Notify success
        if: success()
        run: curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" -d text="✅ Torrin Addon updated successfully on Fly.io"
      - name: Notify failure
        if: failure()
        run: curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" -d text="❌ Torrin Addon update FAILED on Fly.io"

  update-m3u-friendly:
    name: Update M3U Friendly
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: njm-xbmc/addon-m3u_friendly
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy
        run: flyctl deploy --app m3u-friendly --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      - name: Notify success
        if: success()
        run: curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" -d text="✅ M3U Friendly updated successfully on Fly.io"
      - name: Notify failure
        if: failure()
        run: curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" -d text="❌ M3U Friendly update FAILED on Fly.io"

  update-webstreamrmbg:
    name: Update WebStreamrMBG
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: njm-xbmc/WebStreamrMBG
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy
        run: flyctl deploy --app webstreamrmbg --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      - name: Notify success
        if: success()
        run: curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" -d text="✅ WebStreamrMBG updated successfully on Fly.io"
      - name: Notify failure
        if: failure()
        run: curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" -d text="❌ WebStreamrMBG update FAILED on Fly.io"

  daily-summary:
    name: Daily Summary
    runs-on: ubuntu-latest
    needs: [update-comet, update-aiostreams, update-deepbridge, update-streamnzb, update-nuvio-streams, update-sootio, update-aiolists, update-torrin-addon, update-m3u-friendly, update-webstreamrmbg]
    if: always()
    steps:
      - name: Send summary
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d text="🔄 Daily Fly.io check complete — 10 apps checked for updates."
