        run: curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" -d text="❌ StreamNZB update FAILED on Fly.io"

  update-nuvio-streams:
    name: Update Nuvio Streams Addon
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: tapframe/NuvioStreamsAddon
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Check if update needed
        id: check
        run: |
          LATEST=$(git rev-parse HEAD)
          RAW=$(flyctl image show --app nuviostreamsaddon-young-tree-5810 --json 2>/dev/null)
          DEPLOYED=$(echo "$RAW" | jq -r 'if type == "array" then .[0].Labels["org.opencontainers.image.revision"] // "" else .Labels["org.opencontainers.image.revision"] // "" end')
          if [ "$LATEST" = "$DEPLOYED" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      - name: Override Dockerfile for Node 20
        if: steps.check.outputs.changed == 'true'
        run: |
          cat > Dockerfile << 'EOF'
          FROM node:20-alpine
          WORKDIR /app
          COPY package*.json ./
          RUN npm install --production
          COPY . .
          EXPOSE 8080
          ENV PORT=8080
          CMD ["node", "server.js"]
          EOF
      - name: Deploy
        if: steps.check.outputs.changed == 'true'
        run: flyctl deploy --app nuviostreamsaddon-young-tree-5810 --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      - name: Notify success
        if: steps.check.outputs.changed == 'true' && success()
        run: curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" -d text="✅ Nuvio Streams updated successfully on Fly.io"
      - name: Notify failure
        if: steps.check.outputs.changed == 'true' && failure()
        run: curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" -d text="❌ Nuvio Streams update FAILED on Fly.io"

