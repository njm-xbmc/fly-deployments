name: Auto-Update Fly.io Apps

on:
  schedule:
    - cron: '0 3 * * *'  # Runs every day at 3am UTC
  workflow_dispatch:      # Also allows manual trigger from GitHub Actions tab

jobs:

  update-comet:
    name: Update Comet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: g0ldyy/comet
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Check if update needed
        id: check
        run: |
          LATEST=$(git rev-parse HEAD)
          RAW=$(flyctl image show --app comet-late-inlet-5587 --json 2>/dev/null)
          DEPLOYED=$(echo "$RAW" | jq -r 'if type == "array" then .[0].Labels["org.opencontainers.image.revision"] // "" else .Labels["org.opencontainers.image.revision"] // "" end')
          if [ "$LATEST" = "$DEPLOYED" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      - name: Deploy
        if: steps.check.outputs.changed == 'true'
        run: flyctl deploy --app comet-late-inlet-5587 --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      - name: Notify success
        if: steps.check.outputs.changed == 'true' && success()
        run: curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" -d text="✅ Comet updated successfully on Fly.io"
      - name: Notify failure
        if: steps.check.outputs.changed == 'true' && failure()
        run: curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" -d text="❌ Comet update FAILED on Fly.io"

