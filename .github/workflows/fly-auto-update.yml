  daily-summary:
    name: Daily Summary
    runs-on: ubuntu-latest
    needs: [update-comet, update-aiostreams, update-deepbridge, update-streamnzb, update-nuvio-streams, update-sootio, update-aiolists, update-torrin-addon]
    if: always()
    steps:
      - name: Send summary
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d text="🔄 Daily Fly.io check complete — 8 apps checked for updates."
