        run: |
          LATEST=$(curl -s "https://ghcr.io/v2/gaisberg/streamnzb/manifests/latest" -H "Accept: application/vnd.docker.distribution.manifest.v2+json" | jq -r '.config.digest // ""')
          RAW=$(flyctl image show --app user-small-hollow-3661 --json 2>/dev/null)
          DEPLOYED=$(echo "$RAW" | jq -r 'if type == "array" then .[0].Digest // "" else .Digest // "" end')
